<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Re-BOOT Web</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="center-wrap">
  <div style="width:340px;">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:28px;font-weight:700;">
        <span class="re">Re</span><span class="boot">-BOOT</span>
      </div>
      <div style="color:var(--muted);font-size:13px;margin-top:4px;">Firmware OTA Portal</div>
    </div>

    <div id="alerts"></div>

    <div class="card">
      <div class="card-body">
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" autofocus required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-full" id="submit-btn">Sign In</button>
        </form>
      </div>
    </div>
    <div style="text-align:center;color:var(--muted);font-size:12px;margin-top:12px;">
      Default credentials: admin / admin
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    try {
        const r = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
            }),
        });
        if (r.ok) {
            window.location = '/dashboard.html';
        } else {
            showAlert('Invalid username or password.', 'error');
        }
    } catch {
        showAlert('Network error.', 'error');
    }
    btn.disabled = false;
    btn.textContent = 'Sign In';
});
</script>
</body>
</html>
