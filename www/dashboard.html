<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Dashboard — Re-BOOT Web</title>
<link href="/style.css" rel="stylesheet"/>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f6f8fa;
  color: #2c3e50;
  margin: 0;
}
.site-header {
  background-color: #ffffff;
  border-bottom: 2px solid #dcdcdc;
  padding: 10px 20px;
}
.header-container {
  display: flex;
  align-items: center;
}
.logo {
  height: 40px;
  margin-right: 10px;
}
.org-name {
  font-size: 20px;
  font-weight: 600;
}
.site-footer {
  background-color: #ffffff;
  border-top: 2px solid #dcdcdc;
  text-align: center;
  padding: 15px;
  font-size: 14px;
  margin-top: 40px;
}
.site-footer a {
  color: #0073e6;
  text-decoration: none;
}
</style>
</head>
<body>
<header class="site-header">
<div class="header-container">
<img alt="SS Electronics Logo" class="logo" src="logo.png"/>
<h1 class="org-name">SS Electronics</h1>
</div>
</header>

<div class="layout">
<nav class="sidebar" id="sidebar"></nav>
<main class="main">
<div id="alerts"></div>
<div class="page-header">
<h1>Flash Jobs</h1>

<div class="toolbar">
  <a class="btn btn-primary" href="/new_job.html">New Job</a>
</div>

</div>
<div class="card">
<div style="overflow-x:auto;">
<table id="jobs-table">
<thead>
<tr>
<th>#</th><th>Name</th><th>HEX File</th>
<th>Interface</th><th>Device</th>
<th>Status</th><th>Created</th><th>By</th><th></th>
</tr>
</thead>
<tbody id="jobs-body">
<tr><td class="empty-state" colspan="9">Loading...</td></tr>
</tbody>
</table>
</div>
</div>
</main>
</div>
<script src="/app.js"></script>
<script>
let refreshTimer = null;

async function loadJobs() {
    const r = await fetch('/api/jobs');
    if (!r.ok) return;
    const jobs = await r.json();
    const tbody = document.getElementById('jobs-body');
    if (!jobs.length) {
        tbody.innerHTML = `<tr><td colspan="9">
          <div class="empty-state">
            <div class="icon">📋</div>
            No jobs yet. <a href="/new_job.html">Create one.</a>
          </div></td></tr>`;
        return;
    }
    tbody.innerHTML = jobs.map(j => `
      <tr>
        <td class="muted text-sm">${j.id}</td>
        <td><a href="/job.html?id=${j.id}">${j.name}</a></td>
        <td class="mono muted text-sm">${j.hex_file}</td>
        <td>${ifaceBadge(j.interface)}</td>
        <td class="mono muted text-sm">${j.device}</td>
        <td>${statusBadge(j.status)}</td>
        <td class="muted text-sm">${j.created_at.slice(0,16)}</td>
        <td class="muted text-sm">${j.username}</td>
        <td><a href="/job.html?id=${j.id}" class="btn btn-secondary btn-sm">View</a></td>
      </tr>`).join('');

    const hasRunning = jobs.some(j => j.status === 'running' || j.status === 'pending');
    if (hasRunning && !refreshTimer) {
        refreshTimer = setInterval(loadJobs, 3000);
    } else if (!hasRunning && refreshTimer) {
        clearInterval(refreshTimer); refreshTimer = null;
    }
}

(async () => {
    const user = await checkAuth();
    if (!user) return;
    initSidebar(user, 'dashboard');
    await loadJobs();
})();
</script>

</body>
</html>
