<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>New Job — Re-BOOT Web</title>
<link href="/style.css" rel="stylesheet"/>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f6f8fa;
  color: #2c3e50;
  margin: 0;
}
.site-header {
  background-color: #ffffff;
  border-bottom: 2px solid #dcdcdc;
  padding: 10px 20px;
}
.header-container {
  display: flex;
  align-items: center;
}
.logo {
  height: 40px;
  margin-right: 10px;
}
.org-name {
  font-size: 20px;
  font-weight: 600;
}
.site-footer {
  background-color: #ffffff;
  border-top: 2px solid #dcdcdc;
  text-align: center;
  padding: 15px;
  font-size: 14px;
  margin-top: 40px;
}
.site-footer a {
  color: #0073e6;
  text-decoration: none;
}
</style>
</head>
<body>
<header class="site-header">
<div class="header-container">
<img alt="SS Electronics Logo" class="logo" src="logo.png"/>
<h1 class="org-name">SS Electronics</h1>
</div>
</header>

<div class="layout">
<nav class="sidebar" id="sidebar"></nav>
<main class="main">
<div id="alerts"></div>
<div class="page-header">
<div>
<div class="breadcrumb"><a href="/dashboard.html">Dashboard</a> / New Job</div>
<h1>New Flash Job</h1>
</div>
</div>
<form enctype="multipart/form-data" id="job-form">
<div class="row">
<!-- Left -->
<div class="col">
<div class="card">
<div class="card-header">Job &amp; Firmware</div>
<div class="card-body">
<div class="form-group">
<label>Job Name</label>
<input name="name" placeholder="e.g. v2.1.0 production flash" type="text"/>
</div>
<div class="form-group">
<label>HEX File <span style="color:var(--red)">*</span></label>
<input accept=".hex" id="hex-input" name="hex_file" required="" type="file"/>
<div class="muted text-sm mt-1">Intel HEX (.hex), max 16 MB</div>
</div>
<div class="form-group">
<label>Node ID <span style="color:var(--red)">*</span></label>
<input class="mono" name="node_id" placeholder="1" required="" type="text"/>
</div>
</div>
</div>
</div>
<!-- Right -->
<div class="col">
<div class="card">
<div class="card-header">Transport</div>
<div class="card-body">
<div class="form-group">
<label>Interface <span style="color:var(--red)">*</span></label>
<select id="iface-sel" name="interface" required="">
<option value="serial">Serial (UART)</option>
<option value="tcp">TCP</option>
<option value="can">CAN</option>
</select>
</div>
<div class="form-group">
<label id="device-label">Device / IP <span style="color:var(--red)">*</span></label>
<input class="mono" id="device-input" name="device" placeholder="/dev/ttyACM0" required="" type="text"/>
<div class="muted text-sm mt-1" id="device-hint">e.g. /dev/ttyACM0</div>
</div>
<div class="form-group" id="port-row" style="display:none;">
<label>TCP Port</label>
<input class="mono" max="65535" min="1" name="tcp_port" placeholder="5000" type="number"/>
</div>
</div>
</div>
</div>
</div>
<!-- Advanced -->
<div class="card mt-2">
<div class="card-header" id="adv-toggle" style="cursor:pointer;">
          Advanced Options
          <span id="adv-arrow" style="margin-left:auto;font-size:16px;">▼</span>
</div>
<div id="adv-body" style="display:none;">
<div class="card-body">
<div class="row">
<div class="col">
<div class="form-group">
<label>Max Retries <code>-t</code></label>
<input class="mono" max="10" min="0" name="retries" placeholder="2" type="number"/>
</div>
</div>
<div class="col">
<div class="form-group">
<label>Reset Flag <code>-r</code></label>
<select name="reset_flag">
<option value="">Default</option>
<option value="0">0 — No reset</option>
<option value="1">1 — Reset</option>
</select>
</div>
</div>
<div class="col">
<div class="form-group">
<label>Verbose <code>-v</code></label>
<select name="verbose">
<option value="">Default</option>
<option value="1">1 — Basic</option>
<option value="2">2 — Verbose</option>
<option value="3">3 — All HEX records</option>
</select>
</div>
</div>
</div>
<div class="form-group">
<label>Extra Arguments (appended verbatim)</label>
<input class="mono" name="extra_args" placeholder="--some-future-flag value" type="text"/>
</div>
</div>
</div>
</div>
<div class="d-flex gap-2 mt-2">
<button class="btn btn-primary" id="submit-btn" type="submit">Create Job</button>
<a class="btn btn-secondary" href="/dashboard.html">Cancel</a>
</div>
</form>
</main>
</div>
<script src="/app.js"></script>
<script>
const IFACE_HINTS = {
    serial: ['/dev/ttyACM0', 'e.g. /dev/ttyACM0 or /dev/ttyUSB0'],
    can:    ['/dev/ttyUSB0', 'e.g. /dev/ttyUSB0 (USB-CAN adapter)'],
    tcp:    ['192.168.1.100', 'Target IP address'],
};

document.getElementById('iface-sel').addEventListener('change', function() {
    const [ph, hint] = IFACE_HINTS[this.value] || IFACE_HINTS.serial;
    document.getElementById('device-input').placeholder = ph;
    document.getElementById('device-hint').textContent = hint;
    document.getElementById('port-row').style.display = this.value === 'tcp' ? '' : 'none';
});

document.getElementById('adv-toggle').addEventListener('click', () => {
    const body = document.getElementById('adv-body');
    const arrow = document.getElementById('adv-arrow');
    const shown = body.style.display !== 'none';
    body.style.display = shown ? 'none' : '';
    arrow.textContent = shown ? '▼' : '▲';
});

document.getElementById('job-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Creating...';
    try {
        const fd = new FormData(e.target);
        const r = await fetch('/api/jobs', { method: 'POST', body: fd });
        const data = await r.json();
        if (r.ok && data.ok) {
            window.location = `/job.html?id=${data.id}`;
        } else {
            showAlert(data.error || 'Failed to create job.', 'error');
        }
    } catch {
        showAlert('Network error.', 'error');
    }
    btn.disabled = false; btn.textContent = 'Create Job';
});

(async () => {
    const user = await checkAuth();
    if (!user) return;
    initSidebar(user, 'new_job');
})();
</script>

<footer class="site-footer">
<p>© 2026 SS Electronics</p>

</p>
</footer>
</body>
</html>
